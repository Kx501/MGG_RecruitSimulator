<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幻想少女公会招募模拟器</title>
    <style>
        :root {
            --color-bg: #f0f2f5;
            --color-container: #fff;
            --color-text: #333;
            --color-heading: #2c3e50;
            --color-filter-bg: #fdfdfd;
            --color-filter-border: #e2e8f0;
            --color-tag-bg: #fff;
            --color-tag-border: #cbd5e1;
            --color-tag-active-bg: #3498db;
            --color-tag-active-text: #fff;
            --color-tag-active-border: #2980b9;
            --color-tag-hover-bg: #f0f9ff;
            --color-tag-hover-border: #3498db;
            --color-stats-bg: #e0f2fe;
            --color-stats-text: #0369a1;
            --color-stats-border: #3498db;
            --color-th-bg: #475569;
            --color-th-text: #fff;
            --color-td-border: #f1f5f9;
            --color-gold-header-bg: #fff7ed;
            --color-gold-header-border: #f97316;
            --color-purple-header-bg: #faf5ff;
            --color-purple-header-border: #a855f7;
            --color-combo-name: #005eff;
            --color-rarity-3: #e67e22;
            --color-rarity-2: #8e44ad;
            --color-rarity-1: #358fd8;
            --color-rarity-0: #0FB80F;
            --color-reset-bg: #ef4444;
            --color-reset-hover: #dc2626;
            --color-guarantee-gold-bg: #e67e22;
            --color-guarantee-purple-bg: #8e44ad;
            --color-badge-bg: #64748b;
            --color-no-data: #94a3b8;
            --color-label: #64748b;
            --shadow-container: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius-container: 12px;
            --radius-filter: 8px;
            --radius-tag: 4px;
            --radius-badge: 3px;
            --radius-table-wrapper: 8px;
            --radius-btn: 4px;
            --radius-guarantee: 4px;
            --transition-tag: all 0.2s;
            --font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            padding: 20px;
            color: var(--color-text);
            line-height: 1.6;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--color-container);
            padding: 25px;
            border-radius: var(--radius-container);
            box-shadow: var(--shadow-container);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .header-title {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.2em 0.45em;
            flex: 1;
            min-width: 120px;
        }
        .header-title h2 {
            text-align: left;
            color: var(--color-heading);
            margin: 0;
            font-size: 1.4rem;
        }
        .repo-link {
            font-size: 0.72em;
            font-weight: 500;
            color: #64748b;
            text-decoration: none;
            white-space: nowrap;
        }
        .repo-link:hover {
            color: var(--color-tag-active-bg);
            text-decoration: underline;
        }

        .btn-reset {
            padding: 8px 18px;
            background: var(--color-reset-bg);
            color: white;
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn-reset:hover {
            background: var(--color-reset-hover);
            transform: translateY(-1px);
        }
        .btn-reset:active {
            background: #b91c1c;
            transform: scale(0.96);
        }

        /* 标签选择区 */
        .filter-section {
            background: var(--color-filter-bg);
            border: 1px solid var(--color-filter-border);
            border-radius: var(--radius-filter);
            padding: 15px;
            margin-bottom: 20px;
        }
        .filter-group {
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .filter-group:last-child {
            margin-bottom: 0;
        }
        .filter-label {
            font-weight: 600;
            width: 60px;
            min-width: 60px;
            padding-top: 6px;
            color: var(--color-label);
            font-size: 13px;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }
        .tags-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            padding: 6px 12px;
            background: var(--color-tag-bg);
            border: 1.5px solid var(--color-tag-border);
            border-radius: var(--radius-tag);
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition-tag);
            user-select: none;
            white-space: nowrap;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            font-weight: 500;
            letter-spacing: 0.02em;
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tag:hover {
            border-color: var(--color-tag-hover-border);
            background: var(--color-tag-hover-bg);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.12);
        }
        .tag:active {
            transform: scale(0.95);
            transition: transform 0.08s;
        }
        .tag.active {
            background: var(--color-tag-active-bg);
            color: var(--color-tag-active-text);
            border-color: var(--color-tag-active-border);
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.3);
        }
        .tag.active:hover {
            background: #2d8fd4;
            border-color: #1f6fa5;
            box-shadow: 0 3px 10px rgba(52, 152, 219, 0.35);
        }

        /* 统计与结果 */
        .result-stats {
            margin-bottom: 15px;
            font-size: 14px;
            padding: 12px 16px;
            background: var(--color-stats-bg);
            border-radius: 6px;
            color: var(--color-stats-text);
            border-left: 4px solid var(--color-stats-border);
            font-weight: 500;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        .table-wrapper {
            max-height: 600px;
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid var(--color-filter-border);
            border-radius: var(--radius-table-wrapper);
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .table-scroll-x {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-container);
            min-width: 580px;
        }
        th {
            background: var(--color-th-bg);
            color: var(--color-th-text);
            padding: 10px 10px;
            text-align: left;
            font-size: 13px;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
            letter-spacing: 0.03em;
            font-weight: 600;
        }
        td {
            padding: 9px 10px;
            border-bottom: 1px solid var(--color-td-border);
            font-size: 14px;
            vertical-align: middle;
        }
        tbody tr {
            transition: background 0.15s;
        }
        tbody tr:hover {
            background: #f8fafc;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }

        /* 组合标题样式 */
        .combo-header {
            background: #f8fafc;
        }
        .combo-header td {
            padding: 10px 10px;
        }
        .combo-header:hover {
            background: #f1f5f9;
        }
        .tag-badge {
            background: var(--color-badge-bg);
            color: #fff;
            padding: 2px 7px;
            border-radius: var(--radius-badge);
            margin-right: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .combo-name {
            color: var(--color-combo-name);
            margin: 0 2px;
            font-weight: bold;
            white-space: nowrap;
        }
        .combo-header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .combo-header-left {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            min-width: 0;
        }
        .combo-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            white-space: nowrap;
        }
        .combo-count {
            color: #64748b;
            font-size: 12px;
            white-space: nowrap;
        }

        /* 稀有度高亮 */
        .rarity-3 {
            color: var(--color-rarity-3);
            font-weight: bold;
        }
        .rarity-2 {
            color: var(--color-rarity-2);
            font-weight: bold;
        }
        .rarity-1 {
            color: var(--color-rarity-1);
        }
        .rarity-0 {
            color: var(--color-rarity-0);
        }

        .guarantee-tag {
            margin-left: 2px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: var(--radius-guarantee);
            font-size: 11px;
            color: #fff;
            white-space: nowrap;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }

        /* 价值组合行 */
        .combo-header.gold-header td {
            background: linear-gradient(
                90deg,
                var(--color-gold-header-border) 5px,
                var(--color-gold-header-bg) 5px
            ) !important;
        }
        .combo-header.purple-header td {
            background: linear-gradient(
                90deg,
                var(--color-purple-header-border) 5px,
                var(--color-purple-header-bg) 5px
            ) !important;
        }
        .combo-header.gold-header:hover td {
            background: #ffedd5 !important;
        }
        .combo-header.purple-header:hover td {
            background: #f3e8ff !important;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--color-no-data);
        }

        /* 角色名缩进 */
        .role-name-cell {
            padding-left: 25px !important;
        }

        /* ============ 移动端适配 ============ */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 14px;
                border-radius: 10px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            }

            .header-row {
                gap: 8px;
                margin-bottom: 14px;
            }

            .header-title {
                min-width: 80px;
            }
            .header-title h2 {
                font-size: 1.2rem;
            }

            .btn-reset {
                padding: 7px 14px;
                font-size: 12px;
                border-radius: 6px;
                min-height: 36px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            /* 标签选择区 */
            .filter-section {
                padding: 10px 12px;
                margin-bottom: 12px;
                border-radius: 6px;
            }
            .filter-group {
                flex-direction: column;
                gap: 4px;
                margin-bottom: 8px;
            }
            .filter-group:last-child {
                margin-bottom: 0;
            }
            .filter-label {
                width: 100%;
                min-width: unset;
                padding-top: 0;
                font-size: 12px;
                padding-bottom: 2px;
                letter-spacing: 0.04em;
            }
            .tags-container {
                gap: 5px;
            }
            .tag {
                padding: 7px 13px;
                font-size: 12px;
                border-radius: 6px;
                min-height: 38px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-width: 1.5px;
            }
            .tag:active {
                transform: scale(0.93);
            }

            /* 统计栏 */
            .result-stats {
                font-size: 12px;
                padding: 10px 12px;
                margin-bottom: 10px;
                border-left-width: 3px;
                line-height: 1.4;
                border-radius: 5px;
            }

            /* 表格容器 */
            .table-wrapper {
                max-height: 50vh;
                overflow-y: auto;
                overflow-x: hidden;
                border-radius: 6px;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
            }
            .table-scroll-x {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            table {
                min-width: 540px;
                font-size: 13px;
            }
            th {
                padding: 8px 7px;
                font-size: 11px;
                letter-spacing: 0.02em;
            }
            td {
                padding: 7px 7px;
                font-size: 12px;
            }
            .role-name-cell {
                padding-left: 16px !important;
            }

            /* 组合标题 */
            .combo-header td {
                padding: 8px 7px;
            }
            .combo-header-inner {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .combo-header-left {
                gap: 3px;
            }
            .combo-header-right {
                gap: 6px;
                width: 100%;
                justify-content: flex-start;
            }
            .tag-badge {
                font-size: 10px;
                padding: 2px 6px;
                margin-right: 4px;
            }
            .combo-name {
                font-size: 12px;
                margin: 0 1px;
            }
            .guarantee-tag {
                font-size: 10px;
                padding: 2px 8px;
                margin-left: 0;
            }
            .combo-count {
                font-size: 11px;
            }

            /* 稀有度数字 */
            td[style*="font-weight:bold"] {
                font-size: 13px;
            }

            /* 无数据提示 */
            .no-data {
                padding: 30px 15px;
                font-size: 13px;
            }
        }

        /* 超小屏幕 (≤400px) */
        @media (max-width: 400px) {
            body {
                padding: 4px;
            }
            .container {
                padding: 10px;
                border-radius: 8px;
            }
            h2 {
                font-size: 1.05rem;
            }
            .btn-reset {
                padding: 6px 10px;
                font-size: 11px;
                min-height: 32px;
                border-radius: 5px;
            }
            .tag {
                padding: 6px 10px;
                font-size: 11px;
                min-height: 34px;
                border-radius: 5px;
            }
            .tags-container {
                gap: 4px;
            }
            .filter-section {
                padding: 8px 10px;
            }
            .result-stats {
                font-size: 11px;
                padding: 8px 10px;
            }
            table {
                min-width: 360px;
            }
            th {
                padding: 6px 5px;
                font-size: 10px;
            }
            td {
                padding: 5px 5px;
                font-size: 11px;
            }
            .role-name-cell {
                padding-left: 12px !important;
            }
            .combo-name {
                font-size: 11px;
            }
            .tag-badge {
                font-size: 9px;
                padding: 1px 5px;
            }
            .guarantee-tag {
                font-size: 9px;
                padding: 2px 6px;
            }
            .combo-count {
                font-size: 10px;
            }
            .table-wrapper {
                max-height: 45vh;
            }
        }

        .ocr-section {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
        }
        .ocr-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .ocr-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .ocr-btn:hover {
            background: #2980b9;
        }
        .ocr-btn:active {
            transform: scale(0.96);
        }
        .ocr-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .ocr-status {
            font-size: 13px;
            color: #475569;
            font-weight: 500;
        }
        .ocr-config-wrap {
            font-size: 13px;
            color: #334155;
        }
        .ocr-config-wrap summary {
            cursor: pointer;
            font-weight: 600;
            color: #475569;
            user-select: none;
        }
        .ocr-hint {
            margin: 8px 0 0;
            padding: 0;
            font-size: 12px;
            line-height: 1.45;
            color: #64748b;
        }
        .ocr-config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px 12px;
            margin-top: 10px;
            align-items: end;
        }
        .ocr-config-grid label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: #64748b;
        }
        .ocr-config-grid input,
        .ocr-config-grid select,
        .ocr-config-grid textarea {
            font-size: 13px;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            box-sizing: border-box;
            width: 100%;
        }
        .ocr-config-grid textarea {
            font-family: ui-monospace, monospace;
            resize: vertical;
            min-height: 44px;
        }
        .ocr-reset-mini {
            background: #e2e8f0;
            color: #334155;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            height: fit-content;
            align-self: end;
        }
        .ocr-reset-mini:hover {
            background: #cbd5e1;
        }
        @media (max-width: 768px) {
            .ocr-section {
                padding: 10px 12px;
            }
            .ocr-btn {
                font-size: 12px;
                padding: 6px 12px;
            }
            .ocr-status {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="header-title">
                <h2>组合模拟</h2>
                <a id="repoLink" class="repo-link" href="#" target="_blank" rel="noopener noreferrer" hidden>(GitHub)</a>
            </div>
            <button class="btn-reset" onclick="resetTags()">重置选择</button>
        </div>

        <div class="ocr-section">
            <div class="ocr-actions">
                <button class="ocr-btn" id="ocrBtn" type="button" onclick="document.getElementById('ocrInput').click()">可上传截图</button>
                <input type="file" id="ocrInput" accept="image/*" style="display:none" onchange="handleOCRFile(this)">
                <span class="ocr-status" id="ocrStatus"></span>
            </div>
            <details class="ocr-config-wrap">
                <summary>OCR 参数（准确率一般）</summary>
                <p class="ocr-hint">比例框：以画面<strong>中心</strong>为基准裁一块矩形，宽、高相对全屏 0~1。PSM：逗号分隔，常用 11；略糊尝试 11,12。</p>
                <div class="ocr-config-grid">
                    <label>裁切模式
                        <select id="ocrCropMode">
                            <option value="relative">比例框</option>
                            <option value="full">全屏</option>
                        </select>
                    </label>
                    <label>宽 (0~1)
                        <input type="number" id="ocrRelW" min="0" max="1" step="0.01">
                    </label>
                    <label>高 (0~1)
                        <input type="number" id="ocrRelH" min="0" max="1" step="0.01">
                    </label>
                    <label>PSM（逗号分隔）
                        <input type="text" id="ocrPsm" placeholder="11 或 11,12" autocomplete="off">
                    </label>
                    <button type="button" class="ocr-reset-mini" onclick="resetOcrDefaults()">恢复默认</button>
                </div>
            </details>
        </div>

        <div class="filter-section" id="filters">
            <!-- 动态生成 -->
        </div>

        <div class="result-stats" id="stats">请点击上方标签进行价值分析（支持 1-3 词条组合）</div>

        <div class="table-wrapper">
            <div class="table-scroll-x">
                <table>
                    <thead>
                        <tr>
                            <th width="22%">角色名</th>
                            <th>职业</th>
                            <th>种族</th>
                            <th>属性</th>
                            <th>地区</th>
                            <th>稀有度</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="no-data">未选择任何标签</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        /* OCR：裁切(relative 中心比例框 | full 全屏) → 灰度 → 暗底反色 → Tesseract；PSM 列表依次识别，原文拼接后逐字匹配。
           cropRel 仅存 w、h（0~1），位置由中心算出。配置见「OCR 参数」，存 localStorage。 */
        const OCR_DARK_MEAN = 128;
        const OCR_STORAGE_KEY = 'recruit_ocr_v1';
        /** 已同意联网加载 OCR 引擎；清除站点数据前不再弹窗 */
        const OCR_ENGINE_OK_KEY = 'recruit_ocr_dl_v1';
        const OCR_DEFAULT = {
            cropMode: 'relative',
            cropRel: { w: 0.84, h: 0.42 },
            psmList: ['11']
        };
        function cloneOcrDefault() {
            return typeof structuredClone === 'function'
                ? structuredClone(OCR_DEFAULT)
                : JSON.parse(JSON.stringify(OCR_DEFAULT));
        }

        let ocrConfig = cloneOcrDefault();

            {"角色名": "银鳞守卫", "职业": "战士", "种族": "生灵", "属性": "水系", "地区": "海洋", "稀有度": 1},
            {"角色名": "鹰身少女", "职业": "战士", "种族": "生灵", "属性": "风系", "地区": "平原", "稀有度": 1},
            {"角色名": "幽灵枪手", "职业": "射手", "种族": "亡灵", "属性": "暗系", "地区": "海洋", "稀有度": 1},
            {"角色名": "幽灵水手", "职业": "战士", "种族": "亡灵", "属性": "暗系", "地区": "海洋", "稀有度": 1},
            {"角色名": "游荡人偶", "职业": "战士", "种族": "器灵", "属性": "暗系", "地区": "山脉", "稀有度": 1}
            /* <<< SYNC_XLSX_DATA_END */
        ];

        // ==================== 稀有度组合排序引擎（可扩展） ====================
        const RARITY_HIGH_TO_LOW = [3, 2, 1, 0];            // 稀有度数值从高到低
        const POLLUTION = new Set([0]);                     // 污染色集合，可自由增减
        
        // 追加法生成序列
        function generateOrder(list) {
            let seq = [];
            for (let i = 0; i < list.length; i++) {
                const elem = list[i];
                if (i === 0) {
                    seq = [[elem]];
                } else {
                    const newBlock = [];
                    for (const set of seq) {
                        newBlock.push([...set, elem]);
                    }
                    newBlock.push([elem]);
                    seq = seq.concat(newBlock);
                }
            }
            return seq;
        }
        
        // 预计算纯净组和污染组序列及分数映射
        const pureRaritiesDesc = RARITY_HIGH_TO_LOW.filter(r => !POLLUTION.has(r));
        const pureRaritiesAsc = [...pureRaritiesDesc].reverse();
        
        const pureOrder = generateOrder(pureRaritiesDesc);
        const pollutedBase = generateOrder(pureRaritiesAsc);       // 用升序生成
        const pollutedOrder = pollutedBase.reverse().map(set => [...set, ...POLLUTION]); // 反转后附加污染色
        
        // 如果所有稀有度都是污染色，则污染组仅一个全污染组合
        if (pureRaritiesDesc.length === 0) {
            pollutedOrder.push([...POLLUTION]);
        }
        
        // 构建分数映射：组合key（稀有度数字排序后逗号连接） → 分数（越大越好）
        const pureScoreMap = new Map();
        pureOrder.forEach((set, idx) => {
            const key = set.slice().sort((a,b)=>a-b).join(',');
            pureScoreMap.set(key, pollutedOrder.length + (pureOrder.length - 1 - idx));
        });
        
        const pollutedScoreMap = new Map();
        pollutedOrder.forEach((set, idx) => {
            const key = set.slice().sort((a,b)=>a-b).join(',');
            pollutedScoreMap.set(key, pollutedOrder.length - 1 - idx);
        });
        
        /**
         * 获取一组角色的稀有度组合分数
         * @param {Array} roles - 角色对象数组（需含 '稀有度' 字段）
         * @returns {number} 分数，越大越优
         */
        function getComboScore(roles) {
            const raritySet = new Set(roles.map(r => parseInt(r['稀有度'])));
            const hasPollution = Array.from(POLLUTION).some(p => raritySet.has(p));
            const key = Array.from(raritySet).sort((a,b)=>a-b).join(',');
            if (hasPollution) {
                return pollutedScoreMap.get(key) ?? -1;
            } else {
                return pureScoreMap.get(key) ?? -1;
            }
        }
        
        const filterCols = ['职业', '种族', '属性', '地区'];
        let selectedTags = [];
        let allTagValues = [];

        /** 仓库地址；留空则在 *.github.io 上按路径自动推断 */
        const REPO_URL = '';

        function resolveRepoUrl() {
            if (REPO_URL) return REPO_URL;
            const host = location.hostname;
            if (!host.endsWith('.github.io')) return '';
            const user = host.slice(0, -'.github.io'.length);
            const first = location.pathname.split('/').filter(Boolean)[0];
            const repo = first || (user + '.github.io');
            return 'https://github.com/' + user + '/' + repo;
        }

        function initRepoLink() {
            const url = resolveRepoUrl();
            const link = document.getElementById('repoLink');
            if (!link) return;
            if (!url) {
                link.hidden = true;
                return;
            }
            link.href = url;
            link.hidden = false;
        }

        window.onload = () => {
            initRepoLink();
            loadOcrFromStorage();
            applyOcrToDom();
            bindOcrConfigInputs();

            const filterDiv = document.getElementById('filters');
            filterCols.forEach(col => {
                const uniqueValues = [...new Set(allData.map(item => item[col]).filter(Boolean))];
                allTagValues = allTagValues.concat(uniqueValues);
                const group = document.createElement('div');
                group.className = 'filter-group';
                group.innerHTML = `<div class="filter-label">${col}</div>`;
                const tagsContainer = document.createElement('div');
                tagsContainer.className = 'tags-container';
                uniqueValues.forEach(val => {
                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.innerText = val;
                    tag.dataset.val = val;
                    tag.onclick = () => toggleTag(val, tag);
                    tagsContainer.appendChild(tag);
                });
                group.appendChild(tagsContainer);
                filterDiv.appendChild(group);
            });
            allTagValues = [...new Set(allTagValues)];
        };

        function toggleTag(val, element) {
            const index = selectedTags.indexOf(val);
            if (index > -1) {
                selectedTags.splice(index, 1);
                element.classList.remove('active');
            } else {
                if (selectedTags.length >= 9) {
                    alert("最多选择 9 个词条进行组合计算");
                    return;
                }
                selectedTags.push(val);
                element.classList.add('active');
            }
            applyFilters();
        }

        function resetTags() {
            selectedTags = [];
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            applyFilters();
        }

        function getCombinations(array, k) {
            let result = [];
            const f = (start, prev) => {
                if (prev.length === k) {
                    result.push(prev);
                    return;
                }
                for (let i = start; i < array.length; i++) {
                    f(i + 1, [...prev, array[i]]);
                }
            };
            f(0, []);
            return result;
        }

        function applyFilters() {
            const container = document.getElementById('tableBody');
            const stats = document.getElementById('stats');
            const rarityNameMap = { 0: '普通', 1: '稀有', 2: '史诗', 3: '传说' }; // 稀有度文字映射

            if (selectedTags.length === 0) {
                container.innerHTML = '<tr><td colspan="6" class="no-data">未选择任何标签</td></tr>';
                stats.innerText = "请点击上方标签进行价值分析（支持 1-3 词条组合）";
                return;
            }

            let rawCombos = [];
            for (let i = 1; i <= Math.min(selectedTags.length, 3); i++) {
                rawCombos.push(...getCombinations(selectedTags, i));
            }

            let comboResults = rawCombos.map(combo => {
                const filtered = allData.filter(role => {
                    const roleValues = Object.values(role).map(String);
                    return combo.every(tag => roleValues.includes(String(tag)));
                });
            
                if (filtered.length === 0) return null;
            
                const rarities = filtered.map(r => parseInt(r['稀有度']) || 0);
                const minRarity = Math.min(...rarities);
                const score = getComboScore(filtered);          // 新排序分数
            
                return {
                    combo,
                    filtered: filtered.sort((a, b) => b['稀有度'] - a['稀有度']),
                    minRarity,           // 保留，用于保底高亮
                    score
                };
            }).filter(item => item !== null);
            
            // 按分数降序，同分按角色数量降序（可选）
            comboResults.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return b.filtered.length - a.filtered.length;
            });
            
            let finalHTML = "";
            let highValueCount = 0;
            
            comboResults.forEach(item => {
                const isGold = item.minRarity >= 3;
                const isPurple = item.minRarity >= 2;
                if (isPurple) highValueCount++;
            
                const headerClass = isGold ? 'gold-header' : (isPurple ? 'purple-header' : '');

                finalHTML += `
                    <tr class="combo-header ${headerClass}">
                        <td colspan="6">
                            <div class="combo-header-inner">
                                <span class="combo-header-left">
                                    <span class="tag-badge">${item.combo.length}词条</span>
                                    ${item.combo.map(t => `<span class="combo-name">[${t}]</span>`).join(' + ')}
                                </span>
                                <span class="combo-header-right">
                                    ${isGold ? '<span class="guarantee-tag" style="background:#e67e22;">🔥 顶级招募</span>' : ''}
                                    ${(isPurple && !isGold) ? '<span class="guarantee-tag" style="background:#8e44ad;">💎 资深保底</span>' : ''}
                                    <span class="combo-count">人数: ${item.filtered.length}</span>
                                </span>
                            </div>
                        </td>
                    </tr>
                `;

                item.filtered.forEach(row => {
                    const r = row['稀有度'];
                    const rClass = `rarity-${r}`;
                    finalHTML += `
                        <tr>
                            <td class="${rClass} role-name-cell">${row['角色名']}</td>
                            <td>${row['职业']}</td>
                            <td>${row['种族']}</td>
                            <td>${row['属性']}</td>
                            <td>${row['地区']}</td>
                            <td class="rarity-${r}">${rarityNameMap[r] ?? r}</td>
                        </tr>
                    `;
                });
            });

            container.innerHTML = finalHTML || '<tr><td colspan="6" class="no-data">当前组合无匹配角色</td></tr>';
            stats.innerText = `分析完毕：共发现 ${highValueCount} 组具有保底价值的组合`;
        }

        let tesseractWorker = null;

        /** 移动端约定：词条区近画面中心，用宽、高相对全屏从中心裁切 */
        function relFromCenter(size) {
            const w = clamp01(size.w);
            const h = clamp01(size.h);
            const x = Math.max(0, (1 - w) / 2);
            const y = Math.max(0, (1 - h) / 2);
            return { x, y, w, h };
        }

        function canvasRelativeCropFromImage(img, rel) {
            const iw = img.naturalWidth;
            const ih = img.naturalHeight;
            let sx = Math.round(rel.x * iw);
            let sy = Math.round(rel.y * ih);
            let sw = Math.round(rel.w * iw);
            let sh = Math.round(rel.h * ih);
            sx = Math.max(0, Math.min(sx, iw - 1));
            sy = Math.max(0, Math.min(sy, ih - 1));
            sw = Math.max(1, Math.min(sw, iw - sx));
            sh = Math.max(1, Math.min(sh, ih - sy));
            const c = document.createElement('canvas');
            c.width = sw;
            c.height = sh;
            c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
            return c;
        }

        function preprocessForTesseract(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    let w;
                    let h;
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    if (ocrConfig.cropMode === 'full') {
                        w = img.naturalWidth;
                        h = img.naturalHeight;
                        canvas.width = w;
                        canvas.height = h;
                        ctx.drawImage(img, 0, 0);
                    } else {
                        const cropCanvas = canvasRelativeCropFromImage(img, relFromCenter(normalizeCropRel(ocrConfig.cropRel)));
                        w = cropCanvas.width;
                        h = cropCanvas.height;
                        canvas.width = w;
                        canvas.height = h;
                        ctx.drawImage(cropCanvas, 0, 0);
                    }
                    const imageData = ctx.getImageData(0, 0, w, h);
                    const d = imageData.data;
                    let sum = 0;
                    const px = d.length / 4;
                    for (let i = 0; i < d.length; i += 4) {
                        const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
                        d[i] = d[i + 1] = d[i + 2] = g;
                        sum += g;
                    }
                    if (sum / px < OCR_DARK_MEAN) {
                        for (let i = 0; i < d.length; i += 4) {
                            const v = 255 - d[i];
                            d[i] = d[i + 1] = d[i + 2] = v;
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('图片加载失败'));
                };
                img.src = url;
            });
        }

        async function getTesseractWorker(statusEl) {
            if (typeof Tesseract === 'undefined') {
                throw new Error('Tesseract 脚本未加载');
            }
            if (tesseractWorker) return tesseractWorker;
            if (statusEl) statusEl.textContent = '加载引擎与语言包…';
            const worker = await Tesseract.createWorker('chi_sim', 1, {
                workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
                corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-lstm.wasm.js',
                logger(m) {
                    if (m.status === 'recognizing text' && statusEl) {
                        const p = m.progress != null ? Math.round(m.progress * 100) + '%' : '';
                        statusEl.textContent = '识别中… ' + p;
                    }
                }
            });
            tesseractWorker = worker;
            return worker;
        }

        function matchTagsFromText(rawText) {
            const matched = [];
            const cleaned = rawText.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, '');
            allTagValues.forEach(tag => {
                if (tag.length < 2 || matched.includes(tag)) return;
                if ([...tag].every(ch => cleaned.includes(ch))) matched.push(tag);
            });
            return matched;
        }

        async function handleOCRFile(input) {
            const file = input && input.files && input.files[0];
            if (!file) return;
            readDomToOcrConfig();
            saveOcrToStorage();

            const statusEl = document.getElementById('ocrStatus');
            const btn = document.getElementById('ocrBtn');

            if (!tesseractWorker) {
                if (typeof Tesseract === 'undefined') {
                    statusEl.textContent = '❌ Tesseract 脚本未加载';
                    if (input) input.value = '';
                    return;
                }
                let engineOk = false;
                try {
                    engineOk = localStorage.getItem(OCR_ENGINE_OK_KEY) === '1';
                } catch (e) { /* 隐私模式等可能抛错 */ }
                if (!engineOk) {
                    const ok = window.confirm(
                        '首次使用需要联网下载 OCR 引擎与简体中文语言包（约2MB）。是否继续？'
                    );
                    if (!ok) {
                        statusEl.textContent = '已取消，未加载引擎';
                        if (input) input.value = '';
                        return;
                    }
                    try {
                        localStorage.setItem(OCR_ENGINE_OK_KEY, '1');
                    } catch (e) { /* 无法写入则下次仍会询问 */ }
                }
            }

            btn.disabled = true;
            try {
                statusEl.textContent = '预处理…';
                const src = await preprocessForTesseract(file);
                const worker = await getTesseractWorker(statusEl);
                const psmList = ocrConfig.psmList && ocrConfig.psmList.length ? ocrConfig.psmList : ['11'];
                const parts = [];
                for (let i = 0; i < psmList.length; i++) {
                    const psm = psmList[i];
                    statusEl.textContent = '识别中 (' + (i + 1) + '/' + psmList.length + ')…';
                    await worker.setParameters({
                        tessedit_pageseg_mode: psm,
                        preserve_interword_spaces: '1'
                    });
                    const { data } = await worker.recognize(src);
                    parts.push(data && data.text ? data.text : '');
                }
                const text = parts.join('\n');
                console.log('[OCR 原文]\n', text);

                resetTags();
                const found = matchTagsFromText(text);
                if (found.length > 0) {
                    found.forEach(val => {
                        if (selectedTags.length >= 9) return;
                        if (selectedTags.includes(val)) return;
                        selectedTags.push(val);
                        document.querySelectorAll('.tag').forEach(tagEl => {
                            if (tagEl.dataset.val === val) tagEl.classList.add('active');
                        });
                    });
                    statusEl.textContent = '✅ 命中 ' + found.length + ' 个词条';
                    applyFilters();
                } else {
                    statusEl.textContent = '⚠️ 未匹配到词条';
                }
            } catch (e) {
                console.error(e);
                const msg = e && e.message ? e.message : String(e);
                statusEl.textContent = '❌ ' + msg.slice(0, 96);
            } finally {
                btn.disabled = false;
                if (input) input.value = '';
            }
        }
