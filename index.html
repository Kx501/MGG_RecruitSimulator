<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幻想少女公会招募模拟器</title>
    <style>
        :root {
            --color-bg: #f0f2f5;
            --color-container: #fff;
            --color-text: #333;
            --color-heading: #2c3e50;
            --color-filter-bg: #fdfdfd;
            --color-filter-border: #e2e8f0;
            --color-tag-bg: #fff;
            --color-tag-border: #cbd5e1;
            --color-tag-active-bg: #3498db;
            --color-tag-active-text: #fff;
            --color-tag-active-border: #2980b9;
            --color-tag-hover-bg: #f0f9ff;
            --color-tag-hover-border: #3498db;
            --color-stats-bg: #e0f2fe;
            --color-stats-text: #0369a1;
            --color-stats-border: #3498db;
            --color-th-bg: #475569;
            --color-th-text: #fff;
            --color-td-border: #f1f5f9;
            --color-gold-header-bg: #fff7ed;
            --color-gold-header-border: #f97316;
            --color-purple-header-bg: #faf5ff;
            --color-purple-header-border: #a855f7;
            --color-combo-name: #005eff;
            --color-rarity-3: #e67e22;
            --color-rarity-2: #8e44ad;
            --color-rarity-1: #358fd8;
            --color-rarity-0: #0FB80F;
            --color-reset-bg: #ef4444;
            --color-reset-hover: #dc2626;
            --color-guarantee-gold-bg: #e67e22;
            --color-guarantee-purple-bg: #8e44ad;
            --color-badge-bg: #64748b;
            --color-no-data: #94a3b8;
            --color-label: #64748b;
            --shadow-container: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius-container: 12px;
            --radius-filter: 8px;
            --radius-tag: 4px;
            --radius-badge: 3px;
            --radius-table-wrapper: 8px;
            --radius-btn: 4px;
            --radius-guarantee: 4px;
            --transition-tag: all 0.2s;
            --font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            padding: 20px;
            color: var(--color-text);
            line-height: 1.6;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--color-container);
            padding: 25px;
            border-radius: var(--radius-container);
            box-shadow: var(--shadow-container);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .header-title {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.2em 0.45em;
            flex: 1;
            min-width: 120px;
        }
        .header-title h2 {
            text-align: left;
            color: var(--color-heading);
            margin: 0;
            font-size: 1.4rem;
        }
        .repo-link {
            font-size: 0.72em;
            font-weight: 500;
            color: #64748b;
            text-decoration: none;
            white-space: nowrap;
        }
        .repo-link:hover {
            color: var(--color-tag-active-bg);
            text-decoration: underline;
        }

        .header-actions {
            display: flex;
            align-items: stretch;
            gap: 8px;
            flex-shrink: 0;
        }

        .header-actions .ocr-btn,
        .header-actions .btn-reset {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            min-height: 36px;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            border: none;
            cursor: pointer;
        }

        .btn-reset {
            background: var(--color-reset-bg);
            color: white;
        }
        .btn-reset:hover {
            background: var(--color-reset-hover);
            transform: translateY(-1px);
        }
        .btn-reset:active {
            background: #b91c1c;
            transform: scale(0.96);
        }

        /* 标签选择区 */
        .filter-section {
            background: var(--color-filter-bg);
            border: 1px solid var(--color-filter-border);
            border-radius: var(--radius-filter);
            padding: 15px;
            margin-bottom: 20px;
        }
        .filter-group {
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .filter-group:last-child {
            margin-bottom: 0;
        }
        .filter-label {
            font-weight: 600;
            width: 60px;
            min-width: 60px;
            padding-top: 6px;
            color: var(--color-label);
            font-size: 13px;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }
        .tags-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            padding: 6px 12px;
            background: var(--color-tag-bg);
            border: 1.5px solid var(--color-tag-border);
            border-radius: var(--radius-tag);
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition-tag);
            user-select: none;
            white-space: nowrap;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            font-weight: 500;
            letter-spacing: 0.02em;
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tag:hover {
            border-color: var(--color-tag-hover-border);
            background: var(--color-tag-hover-bg);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.12);
        }
        .tag:active {
            transform: scale(0.95);
            transition: transform 0.08s;
        }
        .tag.active {
            background: var(--color-tag-active-bg);
            color: var(--color-tag-active-text);
            border-color: var(--color-tag-active-border);
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.3);
        }
        .tag.active:hover {
            background: #2d8fd4;
            border-color: #1f6fa5;
            box-shadow: 0 3px 10px rgba(52, 152, 219, 0.35);
        }

        /* 统计与结果 */
        .result-stats {
            margin-bottom: 15px;
            font-size: 14px;
            padding: 12px 16px;
            background: var(--color-stats-bg);
            border-radius: 6px;
            color: var(--color-stats-text);
            border-left: 4px solid var(--color-stats-border);
            font-weight: 500;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        .table-wrapper {
            max-height: 600px;
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid var(--color-filter-border);
            border-radius: var(--radius-table-wrapper);
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .table-scroll-x {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-container);
            min-width: 580px;
        }
        th {
            background: var(--color-th-bg);
            color: var(--color-th-text);
            padding: 10px 10px;
            text-align: left;
            font-size: 13px;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
            letter-spacing: 0.03em;
            font-weight: 600;
        }
        td {
            padding: 9px 10px;
            border-bottom: 1px solid var(--color-td-border);
            font-size: 14px;
            vertical-align: middle;
        }
        tbody tr {
            transition: background 0.15s;
        }
        tbody tr:hover {
            background: #f8fafc;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }

        /* 组合标题样式 */
        .combo-header {
            background: #f8fafc;
        }
        .combo-header td {
            padding: 10px 10px;
        }
        .combo-header:hover {
            background: #f1f5f9;
        }
        .tag-badge {
            background: var(--color-badge-bg);
            color: #fff;
            padding: 2px 7px;
            border-radius: var(--radius-badge);
            margin-right: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .combo-name {
            color: var(--color-combo-name);
            margin: 0 2px;
            font-weight: bold;
            white-space: nowrap;
        }
        .combo-header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .combo-header-left {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            min-width: 0;
        }
        .combo-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            white-space: nowrap;
        }
        .combo-count {
            color: #64748b;
            font-size: 12px;
            white-space: nowrap;
        }

        /* 稀有度高亮 */
        .rarity-3 {
            color: var(--color-rarity-3);
            font-weight: bold;
        }
        .rarity-2 {
            color: var(--color-rarity-2);
            font-weight: bold;
        }
        .rarity-1 {
            color: var(--color-rarity-1);
        }
        .rarity-0 {
            color: var(--color-rarity-0);
        }

        .guarantee-tag {
            margin-left: 2px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: var(--radius-guarantee);
            font-size: 11px;
            color: #fff;
            white-space: nowrap;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }

        /* 价值组合行 */
        .combo-header.gold-header td {
            background: linear-gradient(
                90deg,
                var(--color-gold-header-border) 5px,
                var(--color-gold-header-bg) 5px
            ) !important;
        }
        .combo-header.purple-header td {
            background: linear-gradient(
                90deg,
                var(--color-purple-header-border) 5px,
                var(--color-purple-header-bg) 5px
            ) !important;
        }
        .combo-header.gold-header:hover td {
            background: #ffedd5 !important;
        }
        .combo-header.purple-header:hover td {
            background: #f3e8ff !important;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--color-no-data);
        }

        /* 角色名缩进 */
        .role-name-cell {
            padding-left: 25px !important;
        }

        /* ============ 移动端适配 ============ */
        @media (max-width: 768px) {
            body {
                padding: 6px;
            }

            .container {
                padding: 10px;
                border-radius: 10px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            }

            .header-row {
                gap: 8px;
                margin-bottom: 8px;
            }

            .header-actions {
                gap: 6px;
            }

            .ocr-section {
                padding: 8px 12px;
                margin-bottom: 10px;
            }
            .ocr-config-row {
                gap: 8px 10px;
            }
            .ocr-config-row label {
                min-width: 0;
                flex: 1 1 calc(50% - 10px);
            }
            .ocr-config-row .ocr-reset-mini {
                flex: 1 1 100%;
                margin-left: 0;
            }
            .ocr-hint {
                font-size: 10px;
            }

            .filter-section {
                padding: 10px 12px;
                margin-bottom: 10px;
                border-radius: 6px;
            }
            .header-title {
                min-width: 80px;
            }
            .header-title h2 {
                font-size: 1.15rem;
            }
            .header-actions .ocr-btn,
            .header-actions .btn-reset {
                padding: 5px 11px;
                font-size: 11px;
                min-height: 32px;
                border-radius: 5px;
            }
            .ocr-status {
                white-space: normal;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .filter-group {
                flex-direction: column;
                align-items: stretch;
                gap: 4px;
                margin-bottom: 8px;
            }
            .filter-group:last-child {
                margin-bottom: 0;
            }
            .filter-label {
                width: 100%;
                min-width: unset;
                padding-top: 0;
                padding-bottom: 2px;
                font-size: 12px;
                letter-spacing: 0.04em;
            }
            .tags-container {
                gap: 5px;
            }
            .tag {
                padding: 6px 12px;
                font-size: 12px;
                border-radius: 6px;
                min-height: 34px;
                border-width: 1.5px;
            }
            .tag:active {
                transform: scale(0.93);
            }

            /* 统计栏 */
            .result-stats {
                font-size: 11px;
                padding: 6px 10px;
                margin-bottom: 6px;
                border-left-width: 3px;
                line-height: 1.35;
                border-radius: 5px;
            }

            .table-wrapper {
                max-height: 58vh;
                overflow-y: auto;
                overflow-x: hidden;
                border-radius: 6px;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
            }
            .table-scroll-x {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            table {
                min-width: 540px;
                font-size: 13px;
            }
            th {
                padding: 8px 7px;
                font-size: 11px;
                letter-spacing: 0.02em;
            }
            td {
                padding: 7px 7px;
                font-size: 12px;
            }
            .role-name-cell {
                padding-left: 16px !important;
            }

            /* 组合标题 */
            .combo-header td {
                padding: 8px 7px;
            }
            .combo-header-inner {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .combo-header-left {
                gap: 3px;
            }
            .combo-header-right {
                gap: 6px;
                width: 100%;
                justify-content: flex-start;
            }
            .tag-badge {
                font-size: 10px;
                padding: 2px 6px;
                margin-right: 4px;
            }
            .combo-name {
                font-size: 12px;
                margin: 0 1px;
            }
            .guarantee-tag {
                font-size: 10px;
                padding: 2px 8px;
                margin-left: 0;
            }
            .combo-count {
                font-size: 11px;
            }

            /* 稀有度数字 */
            td[style*="font-weight:bold"] {
                font-size: 13px;
            }

            /* 无数据提示 */
            .no-data {
                padding: 30px 15px;
                font-size: 13px;
            }
        }

        /* 超小屏幕 (≤400px) */
        @media (max-width: 400px) {
            body {
                padding: 4px;
            }
            .container {
                padding: 8px;
                border-radius: 8px;
            }
            .header-title h2 {
                font-size: 1.05rem;
            }
            .header-actions .ocr-btn,
            .header-actions .btn-reset {
                padding: 4px 8px;
                font-size: 10px;
                min-height: 29px;
            }
            .filter-section {
                padding: 8px 10px;
            }
            .tag {
                padding: 5px 10px;
                min-height: 31px;
                font-size: 11px;
            }
            .result-stats {
                font-size: 10px;
                padding: 5px 8px;
            }
            table {
                min-width: 360px;
            }
            th {
                padding: 6px 5px;
                font-size: 10px;
            }
            td {
                padding: 5px 5px;
                font-size: 11px;
            }
            .role-name-cell {
                padding-left: 12px !important;
            }
            .combo-name {
                font-size: 11px;
            }
            .tag-badge {
                font-size: 9px;
                padding: 1px 5px;
            }
            .guarantee-tag {
                font-size: 9px;
                padding: 2px 6px;
            }
            .combo-count {
                font-size: 10px;
            }
        }

        .ocr-section {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: var(--radius-filter);
            padding: 10px 14px;
            margin-bottom: 15px;
        }
        .header-actions .ocr-btn {
            background: #3498db;
            color: white;
        }
        .header-actions .ocr-btn:hover {
            background: #2980b9;
        }
        .header-actions .ocr-btn:active {
            transform: scale(0.96);
        }
        .header-actions .ocr-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .ocr-config-wrap {
            font-size: 13px;
            color: #334155;
        }
        .ocr-config-wrap summary {
            cursor: pointer;
            user-select: none;
            list-style: none;
        }
        .ocr-config-wrap summary::-webkit-details-marker {
            display: none;
        }
        .ocr-summary-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }
        .ocr-status {
            flex: 1;
            min-width: 0;
            font-size: 13px;
            color: #475569;
            font-weight: 500;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .ocr-status:empty::before {
            content: '「上传截图」开始识别，建议复查';
            color: #94a3b8;
            font-weight: 400;
        }
        .ocr-summary-label {
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.02em;
        }
        .ocr-summary-label::after {
            content: ' ▸';
            color: #94a3b8;
            font-weight: 400;
        }
        .ocr-config-wrap[open] .ocr-summary-label::after {
            content: ' ▾';
        }
        .ocr-config-body {
            padding-top: 10px;
            margin-top: 8px;
            border-top: 1px solid var(--color-filter-border);
        }
        .ocr-config-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 10px 14px;
        }
        .ocr-config-row label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: #64748b;
            min-width: 110px;
            flex: 1;
        }
        .ocr-config-row input,
        .ocr-config-row select {
            font-size: 13px;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            box-sizing: border-box;
            width: 100%;
        }
        .ocr-hint {
            margin: 10px 0 0;
            padding: 0;
            font-size: 11px;
            line-height: 1.5;
            color: #94a3b8;
        }
        .ocr-hint a {
            color: #64748b;
        }
        .ocr-reset-mini {
            background: #e2e8f0;
            color: #334155;
            border: none;
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            height: 34px;
            flex-shrink: 0;
            margin-left: auto;
            align-self: flex-end;
        }
        .ocr-reset-mini:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="header-title">
                <h2>组合模拟</h2>
                <a id="repoLink" class="repo-link" href="#" target="_blank" rel="noopener noreferrer" hidden>(GitHub)</a>
            </div>
            <div class="header-actions">
                <button class="ocr-btn" id="ocrBtn" type="button" onclick="document.getElementById('ocrInput').click()">上传截图</button>
                <button class="btn-reset" onclick="resetTags()">重置选择</button>
            </div>
        </div>
        <input type="file" id="ocrInput" accept="image/*" style="display:none" onchange="handleOCRFile(this)">

        <div class="ocr-section">
            <details class="ocr-config-wrap">
                <summary>
                    <span class="ocr-summary-bar">
                        <span class="ocr-status" id="ocrStatus"></span>
                        <span class="ocr-summary-label">裁切参数</span>
                    </span>
                </summary>
                <div class="ocr-config-body">
                    <div class="ocr-config-row">
                        <label>裁切模式
                            <select id="ocrCropMode">
                                <option value="relative">比例框</option>
                                <option value="full">全屏</option>
                            </select>
                        </label>
                        <label>宽度比例（0~1）
                            <input type="number" id="ocrRelW" min="0" max="1" step="0.01">
                        </label>
                        <label>高度比例（0~1）
                            <input type="number" id="ocrRelH" min="0" max="1" step="0.01">
                        </label>
                        <button type="button" class="ocr-reset-mini" onclick="resetOcrDefaults()">恢复默认</button>
                    </div>
                    <p class="ocr-hint">使用 <a href="https://www.paddleocr.ai/latest/en/version3.x/inference_deployment/cross_platform/browser.html" target="_blank" rel="noopener noreferrer">PaddleOCR.js</a> 识别截图中的词条。支持 WebGPU 加速（不可用则回退 WASM）。默认以画面中心裁切，比例可在上方调整。</p>
                </div>
            </details>
        </div>

        <div class="filter-section" id="filters">
            <!-- 动态生成 -->
        </div>

        <div class="result-stats" id="stats">请点击上方标签进行价值分析（支持 1-3 词条组合）</div>

        <div class="table-wrapper">
            <div class="table-scroll-x">
                <table>
                    <thead>
                        <tr>
                            <th width="22%">角色名</th>
                            <th>职业</th>
                            <th>种族</th>
                            <th>属性</th>
                            <th>地区</th>
                            <th>稀有度</th>
                        </tr>

                h: clamp01(obj.h != null ? obj.h : d.h)

        // ==================== 稀有度组合排序引擎（可扩展） ====================
        const RARITY_HIGH_TO_LOW = [3, 2, 1, 0];            // 稀有度数值从高到低
        const POLLUTION = new Set([0]);                     // 污染色集合，可自由增减
        
        // 追加法生成序列
        function generateOrder(list) {
            let seq = [];
            for (let i = 0; i < list.length; i++) {
                const elem = list[i];
                if (i === 0) {
                    seq = [[elem]];
                } else {
                    const newBlock = [];
                    for (const set of seq) {
                        newBlock.push([...set, elem]);
                    }
                    newBlock.push([elem]);
                    seq = seq.concat(newBlock);
                }
            }
            return seq;
        }
        
        // 预计算纯净组和污染组序列及分数映射
        const pureRaritiesDesc = RARITY_HIGH_TO_LOW.filter(r => !POLLUTION.has(r));
        const pureRaritiesAsc = [...pureRaritiesDesc].reverse();
        
        const pureOrder = generateOrder(pureRaritiesDesc);
        const pollutedBase = generateOrder(pureRaritiesAsc);       // 用升序生成
        const pollutedOrder = pollutedBase.reverse().map(set => [...set, ...POLLUTION]); // 反转后附加污染色
        
        // 如果所有稀有度都是污染色，则污染组仅一个全污染组合
        if (pureRaritiesDesc.length === 0) {
            pollutedOrder.push([...POLLUTION]);
        }
        
        // 构建分数映射：组合key（稀有度数字排序后逗号连接） → 分数（越大越好）
        const pureScoreMap = new Map();
        pureOrder.forEach((set, idx) => {
            const key = set.slice().sort((a,b)=>a-b).join(',');
            pureScoreMap.set(key, pollutedOrder.length + (pureOrder.length - 1 - idx));
        });
        
        const pollutedScoreMap = new Map();
        pollutedOrder.forEach((set, idx) => {
            const key = set.slice().sort((a,b)=>a-b).join(',');
            pollutedScoreMap.set(key, pollutedOrder.length - 1 - idx);
        });
        
        /**
         * 获取一组角色的稀有度组合分数
         * @param {Array} roles - 角色对象数组（需含 '稀有度' 字段）
         * @returns {number} 分数，越大越优
         */
        function getComboScore(roles) {
            const raritySet = new Set(roles.map(r => parseInt(r['稀有度'])));
            const hasPollution = Array.from(POLLUTION).some(p => raritySet.has(p));
            const key = Array.from(raritySet).sort((a,b)=>a-b).join(',');
            if (hasPollution) {
                return pollutedScoreMap.get(key) ?? -1;
            } else {
                return pureScoreMap.get(key) ?? -1;
            }
        }
        
        const filterCols = ['职业', '种族', '属性', '地区'];
        const rarityNameMap = { 0: '普通', 1: '稀有', 2: '史诗', 3: '传说' };
        const rarityLevels = [3, 2, 1, 0];
        const rarityNames = rarityLevels.map(n => rarityNameMap[n]);
        let selectedTags = [];

        function roleMatchesTag(role, tag) {
            if (rarityNames.includes(tag)) {
                const level = Object.keys(rarityNameMap).find(k => rarityNameMap[k] === tag);
                return (parseInt(role['稀有度'], 10) || 0) === parseInt(level, 10);
            }
            return Object.values(role).map(String).includes(String(tag));
        }

        function toggleTag(val, element) {

        function getCombinations(array, k) {
            let result = [];
            const f = (start, prev) => {
                if (prev.length === k) {
                    result.push(prev);
                    return;
                }
                for (let i = start; i < array.length; i++) {
                    f(i + 1, [...prev, array[i]]);
                }
            };
            f(0, []);
            return result;
        }

        function applyFilters() {
            const container = document.getElementById('tableBody');
            const stats = document.getElementById('stats');

            if (selectedTags.length === 0) {
                container.innerHTML = '<tr><td colspan="6" class="no-data">未选择任何标签</td></tr>';

                return;
            }

            let rawCombos = [];
            for (let i = 1; i <= Math.min(selectedTags.length, 3); i++) {
                rawCombos.push(...getCombinations(selectedTags, i));
            }

            let comboResults = rawCombos.map(combo => {
                const filtered = allData.filter(role =>
                    combo.every(tag => roleMatchesTag(role, tag))
                );
            
                if (filtered.length === 0) return null;
            
                const rarities = filtered.map(r => parseInt(r['稀有度']) || 0);
                const minRarity = Math.min(...rarities);
                const score = getComboScore(filtered);          // 新排序分数
            
                return {
                    combo,
                    filtered: filtered.sort((a, b) => b['稀有度'] - a['稀有度']),
                    minRarity,           // 保留，用于保底高亮
                    score
                };
            }).filter(item => item !== null);
            
            // 按分数降序，同分按角色数量降序（可选）
            comboResults.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return b.filtered.length - a.filtered.length;
            });
            
            let finalHTML = "";
            let highValueCount = 0;
            
            comboResults.forEach(item => {
                const isGold = item.minRarity >= 3;
                const isPurple = item.minRarity >= 2;
                if (isPurple) highValueCount++;
            
                const headerClass = isGold ? 'gold-header' : (isPurple ? 'purple-header' : '');

                finalHTML += `
                    <tr class="combo-header ${headerClass}">

                                </span>
                                <span class="combo-header-right">
                                    ${isGold ? '<span class="guarantee-tag" style="background:#e67e22;">🔥 顶级招募</span>' : ''}
                                    ${(isPurple && !isGold) ? '<span class="guarantee-tag" style="background:#8e44ad;">💎 资深保底</span>' : ''}
                                    <span class="combo-count">人数: ${item.filtered.length}</span>
                                </span>
                            </div>
                        </td>
                    </tr>
                `;

                item.filtered.forEach(row => {
                    const r = row['稀有度'];
                    const rClass = `rarity-${r}`;
                    finalHTML += `
                        <tr>
                            <td class="${rClass} role-name-cell">${row['角色名']}</td>

                            <td>${row['属性']}</td>
                            <td>${row['地区']}</td>
                            <td class="rarity-${r}">${rarityNameMap[r] ?? r}</td>
                        </tr>
                    `;
                });
            });

            container.innerHTML = finalHTML || '<tr><td colspan="6" class="no-data">当前组合无匹配角色</td></tr>';
            stats.innerText = `分析完毕：共发现 ${highValueCount} 组具有保底价值的组合`;
        }

        let paddleClient = null;
        let paddleInitPromise = null;

        function limitCanvasSize(canvas, maxSide) {
            const w = canvas.width;
            const h = canvas.height;
            if (Math.max(w, h) <= maxSide) return canvas;
            const scale = maxSide / Math.max(w, h);
            const c = document.createElement('canvas');
            c.width = Math.round(w * scale);
            c.height = Math.round(h * scale);
            const ctx = c.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(canvas, 0, 0, c.width, c.height);
            return c;
        }

        /** 移动端约定：词条区近画面中心，用宽、高相对全屏从中心裁切 */
        function relFromCenter(size) {
            const w = clamp01(size.w);
            const h = clamp01(size.h);
            const x = Math.max(0, (1 - w) / 2);
            const y = Math.max(0, (1 - h) / 2);
            return { x, y, w, h };
        }

        function canvasRelativeCropFromImage(img, rel) {
            const iw = img.naturalWidth;
            const ih = img.naturalHeight;
            let sx = Math.round(rel.x * iw);
            let sy = Math.round(rel.y * ih);
            let sw = Math.round(rel.w * iw);
            let sh = Math.round(rel.h * ih);
            sx = Math.max(0, Math.min(sx, iw - 1));
            sy = Math.max(0, Math.min(sy, ih - 1));
            sw = Math.max(1, Math.min(sw, iw - sx));
            sh = Math.max(1, Math.min(sh, ih - sy));
            const c = document.createElement('canvas');
            c.width = sw;
            c.height = sh;
            c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
            return c;
        }

        function cropImageToCanvas(img) {
            let canvas;
            if (ocrConfig.cropMode === 'full') {
                canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                canvas.getContext('2d').drawImage(img, 0, 0);
            } else {
                canvas = canvasRelativeCropFromImage(img, relFromCenter(normalizeCropRel(ocrConfig.cropRel)));
            }
            return limitCanvasSize(canvas, OCR_MAX_SIDE);
        }

        function canvasToOcrBlob(canvas) {
            return new Promise((resolve, reject) => {
                canvas.toBlob(blob => {
                    if (blob) resolve(blob);
                    else reject(new Error('导出图片失败'));
                }, 'image/jpeg', OCR_JPEG_QUALITY);
            });
        }

        function fileToCropBlob(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    try {
                        canvasToOcrBlob(cropImageToCanvas(img)).then(resolve, reject);
                    } catch (e) {
                        reject(e);
                    }
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('图片加载失败'));
                };
                img.src = url;
            });
        }

        async function importPaddleOCR() {
            let lastErr;
            for (const url of PADDLE_ESM_URLS) {
                try {
                    return await import(/* @vite-ignore */ url);
                } catch (e) {
                    lastErr = e;
                    console.warn('[OCR] CDN 加载失败:', url, e);
                }
            }
            throw lastErr || new Error('PaddleOCR 脚本加载失败（请检查网络或 CDN）');
        }

        async function ensurePaddleClient(statusEl) {
            if (paddleClient) return paddleClient;
            if (paddleInitPromise) return paddleInitPromise;

            paddleInitPromise = (async () => {
                const mod = await importPaddleOCR();
                const PaddleOCR = mod.PaddleOCR;
                if (!PaddleOCR) throw new Error('PaddleOCR 模块加载失败');
                if (statusEl) statusEl.textContent = '正在初始化模型，首次加载可能较慢…';
                const ortOpts = {
                    backend: 'auto',
                    wasmPaths: ORT_WASM_BASE,
                    numThreads: 1,
                    simd: true
                };
                let client;
                try {
                    client = await PaddleOCR.create({
                        textDetectionModelName: 'PP-OCRv6_tiny_det',
                        textRecognitionModelName: 'PP-OCRv6_tiny_rec',
                        textDetectionBatchSize: 1,
                        textRecognitionBatchSize: 4,
                        ortOptions: ortOpts
                    });
                } catch (e) {
                    console.warn('[OCR] PP-OCRv6 tiny 不可用，回退 PP-OCRv5', e);
                    client = await PaddleOCR.create({
                        lang: 'ch',
                        ocrVersion: 'PP-OCRv5',
                        textDetectionBatchSize: 1,
                        textRecognitionBatchSize: 4,
                        ortOptions: ortOpts
                    });
                }
                paddleClient = client;
                return client;
            })();

            try {
                return await paddleInitPromise;
            } catch (e) {
                paddleInitPromise = null;
                throw e;
            }
        }

        function maybeWarmupOcrEngine() {
            if (location.protocol === 'file:') return;
            try {
                if (localStorage.getItem(OCR_ENGINE_OK_KEY) !== '1') return;
            } catch (e) { return; }
            ensurePaddleClient(null).catch(err => console.warn('[OCR] 后台预热失败', err));
        }

        function paddleTextFromResult(result) {
            if (!result || !Array.isArray(result.items)) return '';
            return result.items.map(it => it && it.text).filter(Boolean).join('\n');
        }

        function isOcrUiLine(text) {
            return /最多选择|招募特定角色|\(\d+\s*\/\s*\d+\)/.test(text);
        }

        function normalizeOcrLine(text) {
            return text.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, '');
        }

        function matchTagsFromOcrResult(result) {
            const matched = [];
            if (!result || !Array.isArray(result.items)) return matched;
            const tags = allTagValues.filter(t => t.length >= 2);

            for (const item of result.items) {
                if (!item || !item.text || isOcrUiLine(item.text)) continue;
                const line = normalizeOcrLine(item.text);
                if (!line) continue;

                const hit = tags.find(t => t === line);
                if (hit && !matched.includes(hit)) {
                    matched.push(hit);
                }
            }
            return matched;
        }

        async function handleOCRFile(input) {
            const file = input && input.files && input.files[0];
            if (!file) return;
            readDomToOcrConfig();
            saveOcrToStorage();

            const statusEl = document.getElementById('ocrStatus');
            const btn = document.getElementById('ocrBtn');

            if (location.protocol === 'file:') {
                statusEl.textContent = '❌ 请通过 HTTP(S) 访问本页（如 GitHub Pages 或 localhost），本地文件方式无法使用 OCR';
                if (input) input.value = '';
                return;
            }

            if (!paddleClient) {
                let engineOk = false;
                try {
                    engineOk = localStorage.getItem(OCR_ENGINE_OK_KEY) === '1';
                } catch (e) { /* 隐私模式等可能抛错 */ }
                if (!engineOk) {
                    const ok = window.confirm(
                        '首次使用需要联网下载 OCR 模型与运行库（约 20MB+，之后会缓存在浏览器中）。是否继续？'
                    );
                    if (!ok) {
                        statusEl.textContent = '已取消加载';
                        if (input) input.value = '';
                        return;
                    }
                    try {
                        localStorage.setItem(OCR_ENGINE_OK_KEY, '1');
                    } catch (e) { /* 无法写入则下次仍会询问 */ }
                }
            }

            btn.disabled = true;
            try {
                const needInit = !paddleClient;
                statusEl.textContent = needInit ? '正在加载引擎并处理图片…' : '正在处理图片…';
                const [blob, ocr] = await Promise.all([
                    fileToCropBlob(file),
                    ensurePaddleClient(needInit ? statusEl : null)
                ]);
                statusEl.textContent = '正在识别文字…';
                const results = await ocr.predict(blob, OCR_PREDICT_OPTS);
                const result = results && results[0];
                const text = paddleTextFromResult(result);
                console.log('[OCR 原文]\n', text);
                if (result && result.items) {
                    console.log('[OCR 行]', result.items.map(it => it.text + ' (' + (it.score != null ? it.score.toFixed(2) : '?') + ')'));
                }
                if (result && result.metrics) {
                    console.log('[OCR 耗时]', result.metrics.totalMs + 'ms', result.runtime || '');
                }

                resetTags();
                const found = matchTagsFromOcrResult(result);
                if (found.length > 0) {
                    found.forEach(val => {
                        if (selectedTags.length >= 9) return;
                        if (selectedTags.includes(val)) return;
                        selectedTags.push(val);
                        document.querySelectorAll('.tag').forEach(tagEl => {
                            if (tagEl.dataset.val === val) tagEl.classList.add('active');
                        });
                    });
                    statusEl.textContent = '✅ 已自动勾选 ' + found.length + ' 个词条';
                    applyFilters();
                } else {
                    statusEl.textContent = '⚠️ 识别完成，但未匹配到词条，可检查裁切参数或手动选择';
                }
            } catch (e) {
                console.error(e);
                const msg = e && e.message ? e.message : String(e);
                statusEl.textContent = '❌ ' + msg.slice(0, 96);
            } finally {
                btn.disabled = false;
                if (input) input.value = '';
            }
        }
    </script>
</body>
</html>
